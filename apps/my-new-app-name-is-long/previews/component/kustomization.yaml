apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - preview-params.yaml

patches:
  - target:
      group: argocd-image-updater.argoproj.io
      kind: ImageUpdater
      name: my-new-app-name-is-long
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: argocd
      - op: replace
        path: /spec/writeBackConfig
        value:
          method: argocd
      - op: replace
        path: /spec/applicationRefs/0/images/0/commonUpdateSettings/updateStrategy
        value: newest-build
